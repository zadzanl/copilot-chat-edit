name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run compile

      - run: mkdir -p dist && npx vsce package -o dist/

      - uses: actions/upload-artifact@v4
        with:
          name: copilot-chat-porter.vsix
          path: dist/*.vsix
          retention-days: 30
